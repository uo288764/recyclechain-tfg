version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: recyclechain-db
    environment:
      POSTGRES_DB: recyclechain
      POSTGRES_USER: recyclechain
      POSTGRES_PASSWORD: recyclechain123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: